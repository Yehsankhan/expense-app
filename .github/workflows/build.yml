name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
        build-essential libffi-dev libssl-dev wget

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: Install Android SDK components (FIX AIDL)
      run: |
        mkdir -p $HOME/android-sdk
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk

        mkdir -p $HOME/android-sdk/cmdline-tools/latest
        mv $HOME/android-sdk/cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/

        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
        "platform-tools" \
        "platforms;android-31" \
        "build-tools;31.0.0"

    - name: Verify files
      run: ls -la

    - name: Build APK
      env:
        ANDROIDSDK: $HOME/android-sdk
        ANDROID_HOME: $HOME/android-sdk
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: expense-app-apk
        path: bin/*.apk
