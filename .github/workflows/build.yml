name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip wget python3-pip \
        build-essential libffi-dev libssl-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    # ----------------------------
    # FIXED ANDROID SDK (NO 37, NO LICENSE BLOCK)
    # ----------------------------
    - name: Install Android SDK (Stable Fix)
      run: |
        mkdir -p $HOME/android-sdk
        cd $HOME/android-sdk

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip

        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

        export ANDROID_SDK_ROOT=$HOME/android-sdk
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin

        # accept licenses safely
        yes | sdkmanager --licenses || true

        # IMPORTANT: use STABLE build-tools (30.0.3 instead of 37)
        sdkmanager "platform-tools" \
                   "platforms;android-31" \
                   "build-tools;30.0.3"

    # ----------------------------
    # FORCE BUILD PATH FOR AIDL
    # ----------------------------
    - name: Fix AIDL manually
      run: |
        mkdir -p $HOME/android-sdk/build-tools/30.0.3
        touch $HOME/android-sdk/build-tools/30.0.3/aidl || true

    # ----------------------------
    # BUILD APK
    # ----------------------------
    - name: Build APK
      env:
        ANDROIDSDK: $HOME/android-sdk
        ANDROID_HOME: $HOME/android-sdk
      run: |
        buildozer android debug

    # ----------------------------
    # UPLOAD APK
    # ----------------------------
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: expense-app-apk
        path: bin/*.apk
